<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>Real-Time Chat | Spring Boot + WebSocket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        h2 { margin-top: 0; }

        .row {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            align-items: center;
        }

        input {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            flex: 1;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: white;
        }

        .btn-connect { background: #22c55e; }
        .btn-disconnect { background: #ef4444; }
        .btn-send { background: #2563eb; }

        #log {
            margin-top: 20px;
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
        }

        .chat-message {
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            background: #f1f5f9;
        }

        .chat-time {
            font-size: 11px;
            color: #64748b;
            margin-right: 6px;
        }

        .chat-user {
            font-weight: 600;
            color: #0f172a;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .online {
            background: #dcfce7;
            color: #166534;
        }

        .offline {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Sistema de Comunicação em Tempo Real – Spring Boot + WebSocket</h2>

    <div class="row">
        <label>Nome:</label>
        <input id="name" value="Daniel Oliveira"/>

        <label>Sala:</label>
        <input id="room" value="geral"/>

        <button id="btnConnect" class="btn-connect">Conectar</button>
        <button id="btnDisconnect" class="btn-disconnect">Desconectar</button>

        <span id="status" class="status-badge offline">Offline</span>
    </div>

    <div class="row">
        <input id="msg" placeholder="Escreva sua mensagem..." />
        <button id="btnSend" class="btn-send">Enviar</button>
    </div>

    <h3>Mensagens</h3>
    <div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let subscription = null;

    const logBox = document.getElementById('log');
    const statusBadge = document.getElementById('status');

    document.getElementById("btnConnect").addEventListener("click", connect);
    document.getElementById("btnDisconnect").addEventListener("click", disconnect);
    document.getElementById("btnSend").addEventListener("click", send);
    document.getElementById("msg").addEventListener("keypress", e => {
        if (e.key === "Enter") send();
    });

    function logMessage(msg) {
        const time = msg.sentAt
            ? msg.sentAt
            : new Date().toLocaleTimeString();

        const messageElement = document.createElement("div");
        messageElement.className = "chat-message";

        messageElement.innerHTML = `
            <span class="chat-time">${time}</span>
            <span class="chat-user">${msg.from ?? 'anon'}:</span>
            ${msg.content}
        `;

        logBox.appendChild(messageElement);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function setStatus(isOnline) {
        statusBadge.textContent = isOnline ? "Online" : "Offline";
        statusBadge.className = "status-badge " + (isOnline ? "online" : "offline");
    }

    function connect() {
        if (stompClient && stompClient.connected) return;

        const socket = new SockJS("http://localhost:8080/ws");
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, () => {
            setStatus(true);
            const room = getRoom();

            if (subscription) subscription.unsubscribe();

            subscription = stompClient.subscribe(`/topic/chat/${room}`, frame => {
                const msg = JSON.parse(frame.body);
                logMessage(msg);
            });

            logMessage({
                from: "Sistema",
                content: `Conectado na sala: ${room}`
            });

        }, error => {
            setStatus(false);
            console.error(error);
        });
    }

    function disconnect() {
        if (subscription) subscription.unsubscribe();

        if (stompClient) {
            stompClient.disconnect(() => {
                setStatus(false);
                logMessage({
                    from: "Sistema",
                    content: "Desconectado."
                });
            });
        }
    }

    function send() {
        if (!stompClient || !stompClient.connected) return;

        const content = document.getElementById('msg').value.trim();
        if (!content) return;

        stompClient.send(
            `/app/chat.send/${getRoom()}`,
            {},
            JSON.stringify({
                from: getName(),
                content: content,
                type: "CHAT"
            })
        );

        document.getElementById('msg').value = "";
    }

    function getName() {
        return document.getElementById('name').value || "anon";
    }

    function getRoom() {
        return document.getElementById('room').value || "geral";
    }
</script>

</body>
</html>
